<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bahamut Notifier</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="windowBar">
          <p class="eyebrow">Bahamut Notifier</p>
          <button id="hideButton" class="iconButton" type="button" aria-label="隱藏">×</button>
        </div>

        <div class="heroTop">
          <div class="heroBrand">
            <h1>勇者資訊</h1>
            <p class="heroCaption">帳號資訊與站內動態</p>
          </div>
          <div class="heroActions">
            <button id="loginButton" class="ghostButton" type="button">登入</button>
            <button id="refreshButton" class="refreshButton" type="button">重新整理</button>
          </div>
        </div>

        <button id="heroProfileButton" class="heroProfileCard" type="button">
          <div class="heroAvatarWrap">
            <img id="heroAvatar" class="heroAvatar" alt="avatar" />
            <span id="heroLevel" class="heroLevel">LV.-</span>
          </div>
          <div class="heroIdentity">
            <div id="heroName" class="heroName">尚未登入</div>
            <div id="heroAccount" class="heroAccount">請先登入巴哈姆特</div>
          </div>
        </button>

        <div class="heroStats">
          <div class="heroMetric">
            <span id="heroGp" class="heroMetricValue">-</span>
            <span class="heroMetricLabel">GP</span>
          </div>
          <div class="heroMetric">
            <span id="heroCoin" class="heroMetricValue">-</span>
            <span class="heroMetricLabel">巴幣</span>
          </div>
          <div class="heroMetric">
            <span id="heroDonate" class="heroMetricValue">-</span>
            <span class="heroMetricLabel">贊助</span>
          </div>
        </div>
      </header>

      <section class="statusCard">
        <button id="notificationTab" class="metric metricButton is-active" type="button">
          <span class="metricLabel">通知</span>
          <strong id="notificationCount">0</strong>
        </button>
        <button id="subscriptionTab" class="metric metricButton" type="button">
          <span class="metricLabel">訂閱</span>
          <strong id="subscriptionCount">0</strong>
        </button>
      </section>

      <section class="panel">
        <div class="panelHeader">
          <h2>狀態</h2>
          <span id="authState" class="pill">讀取中</span>
        </div>
        <p id="fetchedAt" class="muted">尚未同步</p>
      </section>

      <section class="panel">
        <div class="panelHeader">
          <h2 id="feedTitle">通知</h2>
          <button id="toggleMoreButton" class="textButton" type="button">更多</button>
        </div>
        <ul id="activeFeed" class="list"></ul>
      </section>

      <section id="developerPanel" class="panel is-hidden">
        <div class="panelHeader">
          <h2>開發者訊息</h2>
        </div>
        <ul id="developerMessages" class="notes developerNotes"></ul>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
